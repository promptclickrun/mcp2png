<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mcp2png basic demo</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 32px;
        background: #f6f7fb;
        color: #172033;
      }

      .card {
        width: 420px;
        border-radius: 20px;
        padding: 24px;
        background: linear-gradient(135deg, #ffffff 0%, #dfe8ff 100%);
        box-shadow: 0 18px 50px rgba(23, 32, 51, 0.16);
      }

      .label {
        color: #4f63d9;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: 12px;
      }

      button {
        margin-top: 16px;
        margin-right: 8px;
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: #172033;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <section id="card" class="card" data-mcp2png-export="demo-card">
        <div class="label">MCP App output</div>
        <h1>Copy me as PNG</h1>
        <p>This represents a rendered MCP Apps card in a chat host.</p>
      </section>

      <button id="copy">Copy PNG</button>
      <button id="download">Download PNG</button>
      <p id="status" role="status"></p>
    </main>

    <script type="module">
      import { copyElementAsPng, downloadPng, elementToPngBlob } from '../../dist/index.js';

      const card = document.querySelector('#card');
      const status = document.querySelector('#status');

      document.querySelector('#copy').addEventListener('click', async () => {
        try {
          const result = await copyElementAsPng(card, {
            fileName: 'mcp2png-demo.png',
            fallbackToDownload: true,
          });
          status.textContent = `Copied with ${result.method}.`;
        } catch (error) {
          status.textContent = error instanceof Error ? error.message : String(error);
        }
      });

      document.querySelector('#download').addEventListener('click', async () => {
        const blob = await elementToPngBlob(card);
        downloadPng(blob, 'mcp2png-demo.png');
      });
    </script>
  </body>
</html>
